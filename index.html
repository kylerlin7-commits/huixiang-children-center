<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>慧智星儿童发展中心管理系统</title>
<style>
:root{
  --color-primary:#4F46E5;
  --color-primary-dark:#4338CA;
  --color-primary-darker:#3730A3;
  --color-secondary:#0EA5E9;
  --color-accent:#F59E0B;
  --color-success:#10B981;
  --color-danger:#EF4444;
  --color-warning:#F59E0B;
  --color-info:#3B82F6;
  --color-bg:#F8FAFC;
  --color-surface:#FFFFFF;
  --color-text:#0F172A;
  --color-text-muted:#64748B;
  --color-border:#E2E8F0;
  --color-muted:#F1F5F9;
  --color-muted-fg:#94A3B8;
  --shadow-sm:0 1px 2px rgba(15,23,42,.06);
  --shadow-md:0 4px 6px rgba(15,23,42,.07),0 2px 4px rgba(15,23,42,.06);
  --shadow-lg:0 10px 15px rgba(15,23,42,.1),0 4px 6px rgba(15,23,42,.05);
  --radius-sm:6px;
  --radius-md:10px;
  --radius-lg:14px;
  --transition:all 200ms cubic-bezier(.4,0,.2,1);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:var(--color-bg);color:var(--color-text);line-height:1.6;font-size:15px}
.app{display:block;min-height:100vh}
.sidebar{background:var(--color-text);color:#fff;padding:0;display:flex;flex-direction:column;position:fixed;width:240px;height:100vh;overflow-y:auto;z-index:40}
.sidebar-header{padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
.sidebar-header .logo{font-size:18px;font-weight:700;color:#fff;letter-spacing:.5px}
.sidebar-header .logo span{color:var(--color-secondary)}
.sidebar-header .subtitle{font-size:12px;color:rgba(255,255,255,.5);margin-top:4px}
.role-switcher{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
.role-switcher label{display:block;font-size:11px;color:rgba(255,255,255,.5);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.role-switcher select{width:100%;padding:8px 10px;border-radius:var(--radius-sm);background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.12);font-size:13px;cursor:pointer}
.role-switcher select:hover{background:rgba(255,255,255,.12)}
.nav{flex:1;padding:12px 8px}
.nav-section{margin-bottom:8px}
.nav-section-title{font-size:11px;color:rgba(255,255,255,.4);padding:8px 12px 4px;text-transform:uppercase;letter-spacing:.5px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);color:rgba(255,255,255,.7);cursor:pointer;font-size:14px;transition:var(--transition);text-decoration:none}
.nav-item:hover{background:rgba(255,255,255,.08);color:#fff}
.nav-item.active{background:var(--color-primary);color:#fff}
.nav-item .icon{width:18px;height:18px;flex-shrink:0}
.main{margin-left:240px;padding:0;display:flex;flex-direction:column;min-height:100vh;min-width:0}
.topbar{background:var(--color-surface);border-bottom:1px solid var(--color-border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:30}
.topbar .page-title{font-size:18px;font-weight:600}
.topbar .user-info{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--color-text-muted)}
.topbar .user-info .avatar{width:32px;height:32px;border-radius:50%;background:var(--color-primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600}
.content{padding:24px;flex:1;width:100%;max-width:100%;overflow-x:auto}
.page{display:none}
.page.active{display:block}
.card{background:var(--color-surface);border-radius:var(--radius-md);box-shadow:var(--shadow-sm);padding:20px;margin-bottom:16px;border:1px solid var(--color-border);width:100%}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{font-size:16px;font-weight:600}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--radius-sm);border:none;font-size:13px;font-weight:500;cursor:pointer;transition:var(--transition);text-decoration:none}
.btn-primary{background:var(--color-primary);color:#fff}
.btn-primary:hover{background:var(--color-primary-dark)}
.btn-secondary{background:var(--color-muted);color:var(--color-text)}
.btn-secondary:hover{background:var(--color-border)}
.btn-success{background:var(--color-success);color:#fff}
.btn-danger{background:var(--color-danger);color:#fff}
.btn-warning{background:var(--color-warning);color:#fff}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-lg{padding:12px 24px;font-size:15px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;margin-bottom:20px}
.stat-card{background:var(--color-surface);border-radius:var(--radius-md);box-shadow:var(--shadow-sm);padding:18px;border:1px solid var(--color-border);transition:var(--transition)}
.stat-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.stat-card .stat-label{font-size:12px;color:var(--color-text-muted);margin-bottom:6px}
.stat-card .stat-value{font-size:26px;font-weight:700;color:var(--color-text)}
.stat-card .stat-change{font-size:12px;margin-top:6px}
.stat-card .stat-change.up{color:var(--color-success)}
.stat-card .stat-change.down{color:var(--color-danger)}
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--color-border)}
th{background:var(--color-muted);font-weight:600;color:var(--color-text-muted);font-size:12px;text-transform:uppercase;letter-spacing:.5px}
tr:hover{background:var(--color-muted)}
.badge{display:inline-block;padding:3px 8px;border-radius:12px;font-size:11px;font-weight:600}
.badge-success{background:#D1FAE5;color:#065F46}
.badge-warning{background:#FEF3C7;color:#92400E}
.badge-danger{background:#FEE2E2;color:#991B1B}
.badge-info{background:#DBEAFE;color:#1E40AF}
.badge-secondary{background:#E5E7EB;color:#374151}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;font-weight:500;margin-bottom:6px;color:var(--color-text)}
.form-group input,.form-group select,.form-group textarea,.form-group .form-control{width:100%;padding:8px 10px;border:1px solid var(--color-border);border-radius:var(--radius-sm);font-size:14px;font-family:inherit}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--color-primary);box-shadow:0 0 0 3px rgba(79,70,229,.1)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:100;align-items:center;justify-content:center;padding:20px}
.modal-overlay.active{display:flex}
.modal{background:var(--color-surface);border-radius:var(--radius-lg);max-width:560px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--color-border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:16px;font-weight:600}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--color-text-muted);line-height:1}
.modal-body{padding:20px}
.modal-footer{padding:14px 20px;border-top:1px solid var(--color-border);display:flex;justify-content:flex-end;gap:8px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.timeline{position:relative;padding-left:24px}
.timeline::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:2px;background:var(--color-border)}
.timeline-item{position:relative;padding-bottom:16px}
.timeline-item::before{content:'';position:absolute;left:-20px;top:4px;width:10px;height:10px;border-radius:50%;background:var(--color-primary)}
.timeline-item .timeline-time{font-size:12px;color:var(--color-text-muted)}
.timeline-item .timeline-title{font-size:14px;font-weight:500;margin-top:2px}
.timeline-item .timeline-desc{font-size:13px;color:var(--color-text-muted);margin-top:4px}
.empty-state{text-align:center;padding:40px 20px;color:var(--color-text-muted)}
.empty-state .icon{font-size:48px;margin-bottom:8px}
.alert{padding:12px 16px;border-radius:var(--radius-sm);margin-bottom:12px;font-size:13px}
.alert-info{background:#EFF6FF;color:#1E40AF;border:1px solid #BFDBFE}
.alert-warning{background:#FFFBEB;color:#92400E;border:1px solid #FDE68A}
.alert-success{background:#ECFDF5;color:#065F46;border:1px solid #A7F3D0}
.alert-danger{background:#FEF2F2;color:#991B1B;border:1px solid #FECACA}
.tabs{display:flex;border-bottom:2px solid var(--color-border);margin-bottom:16px;gap:4px}
.tab{padding:10px 16px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;font-size:14px;color:var(--color-text-muted);transition:var(--transition)}
.tab:hover{color:var(--color-text)}
.tab.active{color:var(--color-primary);border-bottom-color:var(--color-primary);font-weight:600}
.quick-actions{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.quick-action{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-md);padding:16px;text-align:center;cursor:pointer;transition:var(--transition)}
.quick-action:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);border-color:var(--color-primary)}
.quick-action .icon{font-size:28px;margin-bottom:6px}
.quick-action .label{font-size:13px;font-weight:500}
.attendance-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:12px}
.attendance-cell{aspect-ratio:1;border-radius:4px;background:var(--color-muted);display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;transition:var(--transition);border:1px solid transparent}
.attendance-cell:hover{border-color:var(--color-primary)}
.attendance-cell.present{background:#D1FAE5;color:#065F46}
.attendance-cell.absent{background:#FEE2E2;color:#991B1B}
.attendance-cell.leave{background:#FEF3C7;color:#92400E}
.attendance-cell.empty{background:var(--color-muted);color:var(--color-muted-fg)}
.chat-container{display:flex;flex-direction:column;height:500px;border:1px solid var(--color-border);border-radius:var(--radius-md);overflow:hidden}
.chat-messages{flex:1;overflow-y:auto;padding:16px;background:var(--color-muted)}
.chat-message{margin-bottom:12px;max-width:70%}
.chat-message.self{margin-left:auto;text-align:right}
.chat-message .bubble{display:inline-block;padding:8px 12px;border-radius:12px;background:var(--color-surface);box-shadow:var(--shadow-sm);font-size:14px}
.chat-message.self .bubble{background:var(--color-primary);color:#fff}
.chat-message .meta{font-size:11px;color:var(--color-text-muted);margin-top:4px}
.chat-input{padding:12px;border-top:1px solid var(--color-border);display:flex;gap:8px;background:var(--color-surface)}
.chat-input input{flex:1;padding:8px 12px;border:1px solid var(--color-border);border-radius:var(--radius-sm);font-size:14px}
.upload-area{border:2px dashed var(--color-border);border-radius:var(--radius-md);padding:24px;text-align:center;cursor:pointer;transition:var(--transition)}
.upload-area:hover{border-color:var(--color-primary);background:var(--color-muted)}
.upload-area .icon{font-size:32px;color:var(--color-text-muted);margin-bottom:8px}
.progress-bar{height:8px;background:var(--color-muted);border-radius:4px;overflow:hidden;margin-top:4px}
.progress-bar .fill{height:100%;background:var(--color-primary);transition:width 300ms ease}
.checkbox-group{display:flex;flex-direction:column;gap:6px}
.checkbox-item{display:flex;align-items:center;gap:8px;font-size:14px}
.checkbox-item input{width:auto}
.tag{display:inline-block;padding:2px 8px;background:var(--color-muted);border-radius:4px;font-size:12px;color:var(--color-text-muted);margin-right:4px}
.tag-primary{background:#E0E7FF;color:#3730A3}
.tag-success{background:#D1FAE5;color:#065F46}
.tag-warning{background:#FEF3C7;color:#92400E}
.tag-danger{background:#FEE2E2;color:#991B1B}
.divider{height:1px;background:var(--color-border);margin:16px 0}
.media-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-top:12px}
.media-item{position:relative;border-radius:var(--radius-sm);overflow:hidden;aspect-ratio:1;background:var(--color-muted)}
.media-item img,.media-item video{width:100%;height:100%;object-fit:cover}
.media-item .overlay{position:absolute;inset:0;background:rgba(0,0,0,.5);opacity:0;display:flex;align-items:center;justify-content:center;transition:var(--transition)}
.media-item:hover .overlay{opacity:1}
.media-item .overlay .btn{padding:4px 8px;font-size:11px;margin:0 2px}
@media(max-width:768px){
  .sidebar{position:fixed;transform:translateX(-100%);transition:transform 200ms}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .form-row{grid-template-columns:1fr}
  .grid-2,.grid-3{grid-template-columns:1fr}
}
</style>
</head>
<body data-current-role="parent">
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">慧智<span>星</span></div>
      <div class="subtitle">儿童发展中心管理系统</div>
    </div>
    <div class="role-switcher">
      <label>当前角色</label>
      <select id="roleSwitcher" onchange="switchRole(this.value)">
        <option value="parent">家长</option>
        <option value="teacher">康复老师</option>
        <option value="supervisor">教学主管</option>
        <option value="admin">行政主管</option>
      </select>
    </div>
    <nav class="nav" id="navMenu"></nav>
  </aside>
  <main class="main">
    <header class="topbar">
      <div class="page-title" id="pageTitle">首页</div>
      <div class="user-info">
        <span id="currentUserName">家长用户</span>
        <div class="avatar" id="userAvatar">家</div>
      </div>
    </header>
    <div class="content" id="content"></div>
  </main>
</div>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">标题</div>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>
<script>

/* ========== DB Layer (LocalStorage) ========== */
const DB = {
  get(k, d){ try{ const v = localStorage.getItem('hzx_'+k); return v? JSON.parse(v): d; }catch(e){ return d; } },
  set(k, v){ localStorage.setItem('hzx_'+k, JSON.stringify(v)); },
  remove(k){ localStorage.removeItem('hzx_'+k); },
  uid(){ return 'id_'+Date.now()+'_'+Math.random().toString(36).slice(2,8); }
};

/* ========== Role Definitions ========== */
const ROLE_INFO = {
  parent:     { name:'家长',     avatar:'家',  userName:'家长用户' },
  teacher:    { name:'康复老师', avatar:'师',  userName:'李老师' },
  supervisor: { name:'教学主管', avatar:'主',  userName:'张主管' },
  admin:      { name:'行政主管', avatar:'行',  userName:'王主任' }
};

const NAV_MENUS = {

    { section:'首页', items:[ {key:'parent-home',label:'首页',icon:'🏠'} ] },

      {key:'parent-courses',label:'每日课程',icon:'📚'},
      {key:'parent-plan',label:'训练计划',icon:'📋'},
      {key:'parent-performance',label:'课堂表现',icon:'📊'},

    ]},
    { section:'成长档案', items:[
      {key:'parent-archive',label:'成长档案',icon:'📁'},

    ]},
    { section:'通知缴费', items:[
      {key:'parent-notice',label:'机构公告',icon:'📢'},
      {key:'parent-payment',label:'缴费记录',icon:'💰'},
      {key:'parent-renew',label:'续费提醒',icon:'🔔'}
    ]},
    { section:'互动服务', items:[

    ]}
  ],

    { section:'首页', items:[ {key:'teacher-home',label:'首页',icon:'🏠'} ] },
    { section:'教学任务', items:[
      {key:'teacher-schedule',label:'每日课表',icon:'📅'},
      {key:'teacher-students',label:'学员排班',icon:'👥'},

    ]},
    { section:'课堂记录', items:[
      {key:'teacher-plan',label:'项目计划书',icon:'📋'},
      {key:'teacher-data',label:'数据记录表',icon:'📝'},
      {key:'teacher-upload',label:'上传视频/照片',icon:'🎬'}
    ]},
    { section:'反馈与小结', items:[
      {key:'teacher-summary',label:'阶段训练小结',icon:'📊'},
      {key:'teacher-feedback',label:'日常表现反馈',icon:'💬'},
      {key:'teacher-reply',label:'回复家长留言',icon:'✉️'}
    ]},
    { section:'学员档案', items:[
      {key:'teacher-history',label:'历史评估',icon:'📄'},
      {key:'teacher-scheme',label:'训练方案',icon:'📋'},
      {key:'teacher-progress',label:'康复进度',icon:'📈'}
    ]},
    { section:'课时统计', items:[

    ]}
  ],
  supervisor: [
    { section:'首页', items:[ {key:'sup-home',label:'首页',icon:'🏠'} ] },
    { section:'排课管理', items:[

    ]},
    { section:'教学审核', items:[
      {key:'sup-report-audit',label:'评估报告审核',icon:'📄'},
      {key:'sup-plan-audit',label:'训练计划审核',icon:'📋'},
      {key:'sup-data-audit',label:'数据表审核',icon:'📝'}
    ]},
    { section:'教学督查', items:[
      {key:'sup-quality',label:'课堂记录督查',icon:'🔍'},
      {key:'sup-all-progress',label:'全体学员进度',icon:'📈'}
    ]},
    { section:'教研活动', items:[
      {key:'sup-research',label:'教研活动',icon:'🎓'},
      {key:'sup-training',label:'培训管理',icon:'📚'},
      {key:'sup-collective',label:'集体课程',icon:'👥'},
      {key:'sup-notice',label:'教学通知',icon:'📢'}
    ]},
    { section:'课时与档案', items:[
      {key:'sup-hours',label:'老师课时汇总',icon:'🕐'},
      {key:'sup-archive',label:'年度档案存档',icon:'📁'}
    ]},
    { section:'诉求与财务', items:[
      {key:'sup-qa',label:'家长答疑对接',icon:'❓'},
      {key:'sup-complaint',label:'投诉与诉求',icon:'✉️'},
      {key:'sup-finance',label:'财务台账',icon:'💰'}
    ]}
  ],
  admin: [

      {key:'admin-hr',label:'人事审核',icon:'📋'}
    ]},
    { section:'教务辅助', items:[
      {key:'admin-student-file',label:'学员档案录入',icon:'📁'},
      {key:'admin-new-student',label:'新生建档',icon:'✨'},
      {key:'admin-transfer',label:'转班/结业管理',icon:'🔄'}
    ]},
    { section:'统筹排课', items:[
      {key:'admin-master-schedule',label:'总课表',icon:'📅'},
      {key:'admin-parent-demand',label:'家长课程诉求',icon:'💬'}
    ]},
    { section:'全局设置', items:[
      {key:'admin-announce',label:'机构公告/资讯',icon:'📢'},

    ]}

/* ========== Seed Data ========== */
function seedData(){

/* ========== Utility Functions ========== */
function el(tag, attrs, children){
  const e = document.createElement(tag);
  if(attrs) for(const k in attrs){
    if(k === 'class') e.className = attrs[k];
    else if(k === 'html') e.innerHTML = attrs[k];
    else if(k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
    else e.setAttribute(k, attrs[k]);
  }
  if(children){
    if(typeof children === 'string') e.innerHTML = children;
    else if(Array.isArray(children)) children.forEach(c => { if(c) e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c); });
    else e.appendChild(children);
  }
  return e;
}
function formatDate(d){ return new Date(d).toISOString().slice(0,10); }
function todayStr(){ return formatDate(new Date()); }
function badge(status){
  const map = { '已缴':'badge-success','欠费':'badge-danger','待审核':'badge-warning','已审核':'badge-success','已处理':'badge-success','处理中':'badge-warning','待回复':'badge-warning','已回复':'badge-success','待确认':'badge-warning','已确认':'badge-success','已排课':'badge-info','已完成':'badge-success','启用':'badge-success','停用':'badge-danger','出勤':'badge-success','请假':'badge-warning','在职':'badge-success','在读':'badge-success','已登记':'badge-success' };
  return `<span class="badge ${map[status]||'badge-secondary'}">${status}</span>`;
}
function emptyState(msg){
  return `<div class="empty-state"><div class="icon">📭</div><div>${msg}</div></div>`;
}

/* ========== Navigation ========== */
function buildNav(role){
  const nav = document.getElementById('navMenu');
  nav.innerHTML = '';
  (NAV_MENUS[role]||[]).forEach(sec => {
    const sDiv = el('div', {class:'nav-section'});
    sDiv.appendChild(el('div', {class:'nav-section-title'}, sec.section));
    sec.items.forEach(item => {
      const a = el('a', {
        class:'nav-item'+(currentPage[role]===item.key?' active':''),
        href:'#',
        onclick:(e)=>{ e.preventDefault(); navigate(item.key); }
      }, `<span class="icon">${item.icon}</span><span>${item.label}</span>`);
      sDiv.appendChild(a);
    });
    nav.appendChild(sDiv);
  });
}

const currentPage = { parent:'parent-home', teacher:'teacher-home', supervisor:'sup-home', admin:'admin-home' };

function switchRole(role){
  document.body.setAttribute('data-current-role', role);
  document.getElementById('roleSwitcher').value = role;
  const info = ROLE_INFO[role];
  document.getElementById('currentUserName').textContent = info.userName;
  document.getElementById('userAvatar').textContent = info.avatar;
  buildNav(role);
  navigate(currentPage[role] || (NAV_MENUS[role][0].items[0].key));
}

function navigate(key){
  const role = document.body.getAttribute('data-current-role');
  currentPage[role] = key;
  buildNav(role);
  const menu = NAV_MENUS[role].flatMap(s => s.items).find(i => i.key === key);
  document.getElementById('pageTitle').textContent = menu ? menu.label : '首页';
  const content = document.getElementById('content');
  content.innerHTML = '';
  const renderer = PAGE_RENDERERS[key];
  if(renderer) renderer(content);
  else content.innerHTML = emptyState('页面建设中...');
}

/* ========== Modal ========== */
function openModal(title, bodyHTML, footerHTML){
  document.getElementById('modalTitle').innerHTML = title;
  document.getElementById('modalBody').innerHTML = bodyHTML;
  document.getElementById('modalFooter').innerHTML = footerHTML || '';
  document.getElementById('modalOverlay').classList.add('active');
}
function closeModal(){ document.getElementById('modalOverlay').classList.remove('active'); }
function toast(msg){
  const t = el('div', {class:'alert alert-info', style:'position:fixed;top:20px;right:20px;z-index:200;min-width:200px'}, msg);
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2500);
}

/* ========== Helper: render table ========== */
function renderTable(headers, rows, actions){
  let html = '<table><thead><tr>';
  headers.forEach(h => html += `<th>${h}</th>`);
  if(actions) html += '<th>操作</th>';
  html += '</tr></thead><tbody>';
  if(rows.length === 0){
    html += `<tr><td colspan="${headers.length+(actions?1:0)}">${emptyState('暂无数据')}</td></tr>`;
  } else {
    rows.forEach(r => {
      html += '<tr>';
      headers.forEach(h => html += `<td>${r[h]!==undefined?r[h]:''}</td>`);
      if(actions) html += `<td>${actions(r)}</td>`;
      html += '</tr>';
    });
  }
  html += '</tbody></table>';
  return html;
}

/* ========== Helper: stat card ========== */
function statCard(label, value, change){
  return `<div class="stat-card"><div class="stat-label">${label}</div><div class="stat-value">${value}</div>${change?`<div class="stat-change ${change.startsWith('+')?'up':'down'}">${change}</div>`:''}</div>`;
}

/* ========== Helper: quick action ========== */
function quickAction(icon, label, onClick){
  return `<div class="quick-action" onclick="${onClick}"><div class="icon">${icon}</div><div class="label">${label}</div></div>`;
}

/* ========== Helper: form group ========== */
function formGroup(label, input){
  return `<div class="form-group"><label>${label}</label>${input}</div>`;
}
function inputText(name, value='', placeholder=''){
  return `<input type="text" name="${name}" value="${value}" placeholder="${placeholder}" class="form-control">`;
}
function inputSelect(name, options, value=''){
  let opts = options.map(o => `<option value="${o.value}"${o.value===value?' selected':''}>${o.label}</option>`).join('');
  return `<select name="${name}" class="form-control">${opts}</select>`;
}
function inputTextarea(name, value='', placeholder=''){
  return `<textarea name="${name}" rows="3" placeholder="${placeholder}" class="form-control">${value}</textarea>`;
}
function inputDate(name, value=''){
  return `<input type="date" name="${name}" value="${value}" class="form-control">`;
}
function inputNumber(name, value='', placeholder=''){
  return `<input type="number" name="${name}" value="${value}" placeholder="${placeholder}" class="form-control">`;
}

/* ---------- Supervisor: Teacher Hours Summary ---------- */
PAGE_RENDERERS['sup-hours'] = (c) => {
  const hours = DB.get('teacherHours',[]);
  const summary = {};
  hours.forEach(h => {
    const key = h.teacher + '|' + h.date.slice(0,7);
    if(!summary[key]) summary[key] = { teacher:h.teacher, month:h.date.slice(0,7), total:0, count:0, verified:false };
    summary[key].total += h.hours;
    summary[key].count++;
  });
  const rows = Object.values(summary);
  c.innerHTML = `<div class="card"><div class="card-header"><div class="card-title">老师课时汇总核实</div></div>${renderTable(['老师','月份','总课时','课程次数','核实状态'], rows.map(r=>({老师:r.teacher,月份:r.month,总课时:r.total+'小时',课程次数:r.count,核实状态:badge(r.verified?'已核实':'待核实')})), r=>`<button class="btn btn-sm btn-success" onclick="verifyHours('${r.teacher}','${r.month}')">核实</button>`)}</div>`;
};
function verifyHours(teacher, month){
  const hours = DB.get('teacherHours',[]);
  hours.forEach(h => {
    if(h.teacher === teacher && h.date.slice(0,7) === month) h.verified = true;
  });
  DB.set('teacherHours', hours);
  toast('已核实');
  navigate('sup-hours');
}

PAGE_RENDERERS['admin-export'] = (c) => {
  const tables = ['students','teachers','classes','courses','notices','payments','leaveRequests','evaluations','trainingPlans','dataRecords','growthArchives','mediaAssets','messages','qaList','complaints','bookings','summaries','feedbacks','teacherHours','researchActivities','trainings','collectiveCourses','teachingNotices','annualArchives','financeRecords','feeItems','accounts','staffAttendance','hrReviews','parentDemands'];
  c.innerHTML = `
    <div class="card">
      <div class="card-header"><div class="card-title">数据统计导出</div></div>
      <div class="alert alert-info">点击下方按钮导出对应数据表(JSON格式)</div>
      <div class="quick-actions">
        ${tables.map(t=>`<div class="quick-action" onclick="exportData('${t}')"><div class="icon">📊</div><div class="label">${t}</div></div>`).join('')}
      </div>
    </div>
    <div class="card">
      <div class="card-header"><div class="card-title">数据概览</div></div>
      <div class="stat-grid">
        ${statCard('学员总数', DB.get('students',[]).length)}
        ${statCard('员工总数', DB.get('accounts',[]).length)}
        ${statCard('课程总数', DB.get('courses',[]).length)}
        ${statCard('公告总数', DB.get('notices',[]).length)}
        ${statCard('财务记录', DB.get('financeRecords',[]).length)}
        ${statCard('档案总数', DB.get('annualArchives',[]).length)}
      </div>
    </div>
  `;
};
function exportData(table){
  const data = DB.get(table, []);
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = table + '_' + todayStr() + '.json';
  a.click();
  URL.revokeObjectURL(url);
  toast('已导出 ' + table);
}

function init(){
  seedData();
  const savedRole = DB.get('currentRole','parent');
  switchRole(savedRole);

  });
}
document.addEventListener('DOMContentLoaded', init);
