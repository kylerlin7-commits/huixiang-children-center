<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>慧智星儿童发展中心管理系统</title>
<style>
:root{
  --brand-50:#eff6ff;--brand-100:#dbeafe;--brand-200:#bfdbfe;--brand-300:#93c5fd;--brand-400:#60a5fa;--brand-500:#3b82f6;--brand-600:#2563eb;--brand-700:#1d4ed8;--brand-800:#1e40af;--brand-900:#1e3a8a;
  --orange-50:#fff7ed;--orange-100:#ffedd5;--orange-200:#fed7aa;--orange-300:#fdba74;--orange-400:#fb923c;--orange-500:#f97316;--orange-600:#ea580c;--orange-700:#c2410c;
  --green-50:#f0fdf4;--green-100:#dcfce7;--green-200:#bbf7d0;--green-300:#86efac;--green-400:#4ade80;--green-500:#22c55e;--green-600:#16a34a;--green-700:#15803d;
  --red-50:#fef2f2;--red-100:#fee2e2;--red-200:#fecaca;--red-300:#fca5a5;--red-400:#f87171;--red-500:#ef4444;--red-600:#dc2626;--red-700:#b91c1c;
  --amber-50:#fffbeb;--amber-100:#fef3c7;--amber-200:#fde68a;--amber-300:#fcd34d;--amber-400:#fbbf24;--amber-500:#f59e0b;--amber-600:#d97706;
  --purple-50:#faf5ff;--purple-100:#f3e8ff;--purple-200:#e9d5ff;--purple-300:#d8b4fe;--purple-400:#c084fc;--purple-500:#a855f7;--purple-600:#9333ea;
  --pink-50:#fdf2f8;--pink-100:#fce7f3;--pink-200:#fbcfe8;--pink-300:#f9a8d4;--pink-400:#f472b6;--pink-500:#ec4899;--pink-600:#db2777;
  --slate-50:#f8fafc;--slate-100:#f1f5f9;--slate-200:#e2e8f0;--slate-300:#cbd5e1;--slate-400:#94a3b8;--slate-500:#64748b;--slate-600:#475569;--slate-700:#334155;--slate-800:#1e293b;--slate-900:#0f172a;--slate-950:#020617;
  --radius:10px;--radius-sm:6px;--radius-lg:16px;--radius-xl:20px;
  --shadow-xs:0 1px 2px rgba(15,23,42,.04);--shadow-sm:0 1px 3px rgba(15,23,42,.08),0 1px 2px rgba(15,23,42,.04);--shadow-md:0 4px 6px -1px rgba(15,23,42,.1),0 2px 4px -2px rgba(15,23,42,.06);--shadow-lg:0 10px 15px -3px rgba(15,23,42,.1),0 4px 6px -4px rgba(15,23,42,.05);--shadow-xl:0 20px 25px -5px rgba(15,23,42,.1),0 8px 10px -6px rgba(15,23,42,.05);
  --t-fast:.15s ease;--t-normal:.25s ease;--t-slow:.4s ease;
  --sidebar-w:248px;--sidebar-collapsed:64px;--topbar-h:56px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
  --font-mono:'SF Mono','Fira Code','Cascadia Code',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font);background:var(--slate-50);color:var(--slate-800);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased;overflow:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none;transition:all var(--t-fast)}
input,select,textarea{font-family:inherit;font-size:14px}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-thumb{background:var(--slate-300);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--slate-400)}
::-webkit-scrollbar-track{background:transparent}

/* App Shell */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:var(--sidebar-w);background:linear-gradient(180deg,var(--slate-900) 0%,var(--slate-800) 100%);color:var(--slate-300);display:flex;flex-direction:column;flex-shrink:0;transition:width var(--t-normal);position:relative;z-index:30}
.sidebar.collapsed{width:var(--sidebar-collapsed)}
.sidebar-header{padding:16px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.08);min-height:var(--topbar-h)}
.sidebar-logo{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--brand-500),var(--purple-500));display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;color:#fff;font-weight:700}
.sidebar-title{font-size:15px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden}
.sidebar.collapsed .sidebar-title{display:none}
.sidebar.collapsed .sidebar-header{justify-content:center;padding:16px 8px}
.sidebar-nav{flex:1;overflow-y:auto;padding:12px 8px}
.sidebar-nav::-webkit-scrollbar{width:4px}
.nav-section{margin-bottom:16px}
.nav-section-title{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--slate-500);padding:8px 12px 4px;font-weight:600}
.sidebar.collapsed .nav-section-title{text-align:center;font-size:0;padding:8px 0 4px}
.sidebar.collapsed .nav-section-title::before{content:'•';font-size:10px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius-sm);color:var(--slate-300);cursor:pointer;font-size:14px;transition:all var(--t-fast);white-space:nowrap;margin-bottom:2px}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff}
.nav-item.active{background:var(--brand-600);color:#fff;box-shadow:var(--shadow-sm)}
.nav-item-icon{width:18px;height:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.nav-item-label{flex:1;overflow:hidden;text-overflow:ellipsis}
.sidebar.collapsed .nav-item{justify-content:center;padding:9px 8px}
.sidebar.collapsed .nav-item-label{display:none}
.sidebar.collapsed .nav-item::after{content:attr(data-short);font-size:10px;position:absolute;opacity:0;pointer-events:none}
.sidebar-footer{padding:12px;border-top:1px solid rgba(255,255,255,.08)}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:var(--topbar-h);background:#fff;border-bottom:1px solid var(--slate-200);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0;z-index:20}
.topbar-toggle{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--slate-600)}
.topbar-toggle:hover{background:var(--slate-100)}
.topbar-title{font-size:16px;font-weight:600;color:var(--slate-800);flex:1}
.topbar-search{position:relative;flex:0 1 280px}
.topbar-search input{width:100%;padding:7px 12px 7px 32px;border-radius:var(--radius-sm);border:1px solid var(--slate-200);background:var(--slate-50);transition:all var(--t-fast)}
.topbar-search input:focus{outline:none;border-color:var(--brand-400);background:#fff;box-shadow:0 0 0 3px var(--brand-50)}
.topbar-search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--slate-400)}
.topbar-actions{display:flex;align-items:center;gap:8px}
.topbar-role{display:flex;align-items:center;gap:8px;padding:5px 10px;border-radius:var(--radius-sm);background:var(--slate-100);font-size:13px}
.topbar-role select{border:none;background:transparent;font-weight:600;color:var(--slate-700);cursor:pointer}
.topbar-role select:focus{outline:none}
.topbar-user{display:flex;align-items:center;gap:8px;padding:4px 10px 4px 4px;border-radius:20px;background:var(--slate-100)}
.topbar-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--brand-500),var(--purple-500));color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600}
.topbar-username{font-size:13px;color:var(--slate-700);font-weight:500}

.content{flex:1;overflow-y:auto;padding:24px;background:var(--slate-50)}
.page{display:none}
.page.active{display:block;animation:fadeIn var(--t-normal)}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* Components */
.card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow-sm);border:1px solid var(--slate-200);overflow:hidden}
.card-header{padding:16px 20px;border-bottom:1px solid var(--slate-200);display:flex;align-items:center;justify-content:space-between;gap:12px}
.card-title{font-size:15px;font-weight:600;color:var(--slate-800)}
.card-body{padding:20px}
.card-body.no-pad{padding:0}

.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;transition:all var(--t-fast);white-space:nowrap;border:1px solid transparent}
.btn-primary{background:var(--brand-600);color:#fff}
.btn-primary:hover{background:var(--brand-700)}
.btn-secondary{background:var(--slate-100);color:var(--slate-700);border-color:var(--slate-200)}
.btn-secondary:hover{background:var(--slate-200)}
.btn-success{background:var(--green-600);color:#fff}
.btn-success:hover{background:var(--green-700)}
.btn-warning{background:var(--amber-500);color:#fff}
.btn-warning:hover{background:var(--amber-600)}
.btn-danger{background:var(--red-500);color:#fff}
.btn-danger:hover{background:var(--red-600)}
.btn-ghost{background:transparent;color:var(--slate-600)}
.btn-ghost:hover{background:var(--slate-100)}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-lg{padding:10px 20px;font-size:14px}
.btn:disabled{opacity:.5;cursor:not-allowed}

.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.badge-success{background:var(--green-100);color:var(--green-700)}
.badge-warning{background:var(--amber-100);color:var(--amber-700)}
.badge-danger{background:var(--red-100);color:var(--red-700)}
.badge-info{background:var(--brand-100);color:var(--brand-700)}
.badge-neutral{background:var(--slate-100);color:var(--slate-600)}
.badge-purple{background:var(--purple-100);color:var(--purple-700)}

.table{width:100%;border-collapse:collapse;font-size:13px}
.table th{background:var(--slate-50);text-align:left;padding:10px 12px;font-weight:600;color:var(--slate-600);border-bottom:1px solid var(--slate-200);white-space:nowrap}
.table td{padding:10px 12px;border-bottom:1px solid var(--slate-100);color:var(--slate-700)}
.table tr:hover td{background:var(--slate-50)}
.table tr:last-child td{border-bottom:none}

.form-group{margin-bottom:14px}
.form-label{display:block;font-size:13px;font-weight:500;color:var(--slate-700);margin-bottom:5px}
.form-label .req{color:var(--red-500);margin-left:2px}
.form-control{width:100%;padding:8px 12px;border:1px solid var(--slate-200);border-radius:var(--radius-sm);font-size:13px;transition:all var(--t-fast);background:#fff}
.form-control:focus{outline:none;border-color:var(--brand-400);box-shadow:0 0 0 3px var(--brand-50)}
textarea.form-control{resize:vertical;min-height:80px;font-family:inherit}
.form-row{display:flex;gap:12px}
.form-row .form-group{flex:1}

.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);display:none;align-items:center;justify-content:center;z-index:100;padding:20px;backdrop-filter:blur(2px)}
.modal-overlay.show{display:flex;animation:fadeIn var(--t-fast)}
.modal{background:#fff;border-radius:var(--radius-lg);max-width:600px;width:100%;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--shadow-xl)}
.modal.lg{max-width:800px}
.modal.xl{max-width:1000px}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--slate-200);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:16px;font-weight:600;color:var(--slate-800)}
.modal-close{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--slate-500)}
.modal-close:hover{background:var(--slate-100);color:var(--slate-700)}
.modal-body{padding:20px;overflow-y:auto;flex:1}
.modal-footer{padding:12px 20px;border-top:1px solid var(--slate-200);display:flex;justify-content:flex-end;gap:8px;background:var(--slate-50)}

.toast-container{position:fixed;top:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:8px}
.toast{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow-lg);padding:12px 16px;display:flex;align-items:center;gap:10px;min-width:280px;border-left:4px solid var(--brand-500);animation:slideIn var(--t-normal)}
.toast.success{border-left-color:var(--green-500)}
.toast.error{border-left-color:var(--red-500)}
.toast.warning{border-left-color:var(--amber-500)}
.toast-icon{font-size:16px}
.toast-msg{flex:1;font-size:13px;color:var(--slate-700)}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow-sm);border:1px solid var(--slate-200);padding:18px}
.stat-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.stat-card-label{font-size:12px;color:var(--slate-500);font-weight:500}
.stat-card-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px}
.stat-card-value{font-size:24px;font-weight:700;color:var(--slate-800)}
.stat-card-trend{font-size:12px;color:var(--slate-500);margin-top:4px}

.empty{text-align:center;padding:40px 20px;color:var(--slate-400)}
.empty-icon{font-size:40px;margin-bottom:8px;opacity:.5}
.empty-text{font-size:13px}

.toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.toolbar .spacer{flex:1}
.filter-select{padding:6px 10px;border:1px solid var(--slate-200);border-radius:var(--radius-sm);font-size:13px;background:#fff;cursor:pointer}
.filter-select:focus{outline:none;border-color:var(--brand-400)}

/* Attendance */
.att-grid-wrap{overflow-x:auto;border:1px solid var(--slate-200);border-radius:var(--radius);background:#fff}
.att-grid{width:100%;border-collapse:collapse;font-size:12px}
.att-grid th,.att-grid td{border:1px solid var(--slate-100);padding:4px;text-align:center;min-width:32px}
.att-grid th{background:var(--slate-50);font-weight:600;color:var(--slate-600);position:sticky;top:0;z-index:1}
.att-grid th.sticky-col,.att-grid td.sticky-col{position:sticky;left:0;z-index:2;background:#fff;min-width:120px;text-align:left;padding:6px 10px}
.att-grid th.sticky-col{background:var(--slate-100);z-index:3}
.att-grid td.sticky-col{font-weight:500;color:var(--slate-700)}
.att-cell{cursor:pointer;border-radius:4px;transition:all var(--t-fast);width:28px;height:28px;display:flex;align-items:center;justify-content:center;margin:0 auto;font-size:11px;font-weight:600}
.att-cell:hover{transform:scale(1.1);box-shadow:var(--shadow-sm)}
.att-cell.empty{color:var(--slate-300)}
.att-cell.full{background:var(--green-100);color:var(--green-700);border:1px solid var(--green-200)}
.att-cell.partial{background:var(--amber-100);color:var(--amber-700);border:1px solid var(--amber-200)}
.att-cell.absent{background:var(--red-100);color:var(--red-700);border:1px solid var(--red-200)}
.att-cell.leave{background:var(--purple-100);color:var(--purple-700);border:1px solid var(--purple-200)}
.att-legend{display:flex;gap:14px;margin-top:12px;flex-wrap:wrap;font-size:12px;color:var(--slate-600)}
.att-legend-item{display:flex;align-items:center;gap:5px}
.att-legend-box{width:14px;height:14px;border-radius:3px}
.att-summary-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:12px}
.att-summary-table th,.att-summary-table td{border:1px solid var(--slate-200);padding:8px 10px;text-align:center}
.att-summary-table th{background:var(--slate-100);font-weight:600}
.att-summary-table .rate-full{color:var(--green-700);font-weight:600}
.att-summary-table .rate-mid{color:var(--amber-700)}
.att-summary-table .rate-low{color:var(--red-700);font-weight:600}

/* Weekly plan upload */
.upload-zone{border:2px dashed var(--slate-300);border-radius:var(--radius);padding:30px;text-align:center;transition:all var(--t-fast);cursor:pointer;background:var(--slate-50)}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--brand-400);background:var(--brand-50)}
.upload-zone-icon{font-size:36px;color:var(--slate-400);margin-bottom:8px}
.upload-zone-text{color:var(--slate-600);font-size:13px;margin-bottom:4px}
.upload-zone-hint{color:var(--slate-400);font-size:12px}
.upload-file-info{background:var(--brand-50);border:1px solid var(--brand-100);border-radius:var(--radius-sm);padding:10px 12px;display:flex;align-items:center;gap:8px;margin-top:10px;font-size:13px}
.upload-file-info .file-icon{font-size:18px}
.upload-file-info .file-name{flex:1;color:var(--slate-700);font-weight:500;word-break:break-all}
.upload-file-info .file-size{color:var(--slate-500);font-size:12px}
.upload-file-info .file-remove{color:var(--red-500);cursor:pointer;padding:2px 6px;border-radius:4px}
.upload-file-info .file-remove:hover{background:var(--red-50)}

/* Review status */
.review-item{border:1px solid var(--slate-200);border-radius:var(--radius);padding:14px;margin-bottom:12px;background:#fff;transition:all var(--t-fast)}
.review-item:hover{box-shadow:var(--shadow-sm)}
.review-item-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.review-item-title{font-weight:600;color:var(--slate-800);font-size:14px}
.review-item-meta{font-size:12px;color:var(--slate-500);margin-bottom:6px}
.review-item-meta span{margin-right:12px}
.review-item-actions{display:flex;gap:6px;margin-top:10px}

/* Tabs */
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--slate-200);margin-bottom:16px}
.tab{padding:8px 14px;font-size:13px;color:var(--slate-600);cursor:pointer;border-bottom:2px solid transparent;transition:all var(--t-fast)}
.tab:hover{color:var(--slate-800)}
.tab.active{color:var(--brand-600);border-bottom-color:var(--brand-600);font-weight:600}

/* Growth timeline */
.timeline{position:relative;padding-left:24px}
.timeline::before{content:'';position:absolute;left:6px;top:0;bottom:0;width:2px;background:var(--slate-200)}
.timeline-item{position:relative;margin-bottom:16px}
.timeline-dot{position:absolute;left:-21px;top:4px;width:10px;height:10px;border-radius:50%;background:var(--brand-500);border:2px solid #fff;box-shadow:0 0 0 2px var(--brand-100)}
.timeline-content{background:#fff;border:1px solid var(--slate-200);border-radius:var(--radius-sm);padding:10px 12px}
.timeline-date{font-size:11px;color:var(--slate-500);margin-bottom:4px}
.timeline-title{font-weight:600;color:var(--slate-800);font-size:13px;margin-bottom:4px}
.timeline-text{font-size:13px;color:var(--slate-600)}

/* Role-based visibility */
[data-role]{display:none!important}
body[data-current-role="admin"] [data-role~="admin"]{display:revert!important}
body[data-current-role="supervisor"] [data-role~="supervisor"]{display:revert!important}
body[data-current-role="teacher"] [data-role~="teacher"]{display:revert!important}
body[data-current-role="parent"] [data-role~="parent"]{display:revert!important}

@media (max-width:768px){
  :root{--sidebar-w:220px}
  .sidebar{position:absolute;height:100%;transform:translateX(-100%);transition:transform var(--t-normal)}
  .sidebar.mobile-open{transform:translateX(0)}
  .topbar-search{display:none}
  .content{padding:16px}
  .stat-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body data-current-role="admin">

<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">慧</div>
      <div class="sidebar-title">慧智星管理系统</div>
    </div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="sidebar-footer">
      <div style="font-size:11px;color:var(--slate-500);text-align:center">v1.0.0 · 儿童发展中心</div>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <button class="topbar-toggle" onclick="toggleSidebar()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="topbar-title" id="topbarTitle">仪表盘</div>
      <div class="topbar-search">
        <span class="topbar-search-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </span>
        <input type="text" placeholder="搜索学生、班级、计划…" oninput="handleSearch(this.value)">
      </div>
      <div class="topbar-actions">
        <div class="topbar-role">
          <span style="color:var(--slate-500)">角色:</span>
          <select id="roleSwitcher" onchange="switchRole(this.value)">
            <option value="admin">管理员（园长）</option>
            <option value="supervisor">教学主管</option>

/* ========== Navigation ========== */
function switchRole(role){
  currentRole = role;
  document.body.setAttribute('data-current-role', role);
  DB.set('currentRole', role);
  renderSidebar();
  document.getElementById('roleSwitcher').value = role;
  const info = ROLE_INFO[role];
  document.getElementById('userAvatar').textContent = info.avatar;
  document.getElementById('userName').textContent = info.label;
  // Navigate to first page of role
  const firstPage = info.nav[0].items[0].id;
  navigateTo(firstPage);
}

function renderSidebar(){
  const nav = document.getElementById('sidebarNav');
  const info = ROLE_INFO[currentRole];
  let html = '';
  info.nav.forEach(section=>{
    html += `<div class="nav-section">`;
    html += `<div class="nav-section-title">${section.section}</div>`;
    section.items.forEach(item=>{
      // Filter by role
      const roles = getRolesForPage(item.id);
      const roleAttr = roles.join(' ');
      html += `<div class="nav-item ${item.id===currentPage?'active':''}" data-page="${item.id}" data-role="${roleAttr}" onclick="navigateTo('${item.id}')" data-short="${item.label.charAt(0)}">
        <span class="nav-item-icon">${item.icon}</span>
        <span class="nav-item-label">${item.label}</span>
      </div>`;
    });
    html += `</div>`;
  });
  nav.innerHTML = html;
}

function getRolesForPage(pageId){
  const map = {
    dashboard:['admin','supervisor','teacher','parent'],
    students:['admin'],
    teachers:['admin','supervisor'],
    classes:['admin'],
    attendance:['admin','supervisor','teacher','parent'],
    'weekly-plans':['admin','supervisor','teacher','parent'],
    'plans-review':['admin','supervisor','teacher'],
    growth:['admin','supervisor','teacher','parent'],
    notices:['admin','supervisor','teacher','parent'],
    settings:['admin']
  };
  return map[pageId]||['admin'];
}

function navigateTo(page){
  currentPage = page;
  document.getElementById('topbarTitle').textContent = PAGE_TITLES[page]||page;
  // Update nav active
  document.querySelectorAll('.nav-item').forEach(el=>{
    el.classList.toggle('active', el.dataset.page===page);
  });
  renderPage(page);
  // Close mobile sidebar
  document.getElementById('sidebar').classList.remove('mobile-open');
}

function toggleSidebar(){
  const sb = document.getElementById('sidebar');
  if(window.innerWidth<=768){
    sb.classList.toggle('mobile-open');
  }else{
    sb.classList.toggle('collapsed');
  }
}

/* ========== Page Rendering ========== */
function renderPage(page){
  const content = document.getElementById('content');
  const roleAttr = getRolesForPage(page).join(' ');
  content.innerHTML = `<div class="page active" data-role="${roleAttr}" id="page-${page}">${getPageContent(page)}</div>`;
  // Call page-specific init
  if(page==='attendance') initAttendance();
  if(page==='weekly-plans') initWeeklyPlans();
}

function getPageContent(page){
  switch(page){
    case 'dashboard': return renderDashboard();
    case 'students': return renderStudents();
    case 'teachers': return renderTeachers();
    case 'classes': return renderClasses();
    case 'attendance': return renderAttendance();
    case 'weekly-plans': return renderWeeklyPlans();
    case 'plans-review': return renderPlansReview();
    case 'growth': return renderGrowth();
    case 'notices': return renderNotices();
    case 'settings': return renderSettings();
    default: return '<div class="empty">页面未找到</div>';
  }
}

function renderDashboard(){

    {label:'活跃班级',value:classes.length,icon:'🏫',bg:'var(--green-100)',color:'var(--green-700)'},

    statsHtml += `<div class="stat-card">

      </div>
      <div class="stat-card-value">${s.value}</div>

  statsHtml += '</div>';

  // Today's attendance quick view
  const today = new Date();
  const todayDay = today.getDate();
  const attData = DB.get('attendance',{records:[]});
  const todayRecords = attData.records.filter(r=>r.day===todayDay);
  const presentToday = todayRecords.filter(r=>r.status==='full'||r.status==='partial').length;
  const absentToday = todayRecords.filter(r=>r.status==='absent').length;

  let cardsHtml = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
      <div class="card">
        <div class="card-header"><span class="card-title">今日出勤</span></div>
        <div class="card-body">
          <div style="display:flex;gap:20px;align-items:center">
            <div style="text-align:center">
              <div style="font-size:28px;font-weight:700;color:var(--green-600)">${presentToday}</div>
              <div style="font-size:12px;color:var(--slate-500)">出勤</div>
            </div>
            <div style="text-align:center">
              <div style="font-size:28px;font-weight:700;color:var(--red-500)">${absentToday}</div>
              <div style="font-size:12px;color:var(--slate-500)">缺勤</div>
            </div>
            <div style="text-align:center">
              <div style="font-size:28px;font-weight:700;color:var(--slate-400)">${students.length-presentToday-absentToday}</div>
              <div style="font-size:12px;color:var(--slate-500)">未记录</div>
            </div>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><span class="card-title">本周计划</span></div>
        <div class="card-body">
          ${plans.slice(0,3).map(p=>`
            <div style="padding:6px 0;border-bottom:1px solid var(--slate-100)">
              <div style="font-weight:500;font-size:13px">${p.title}</div>
              <div style="font-size:12px;color:var(--slate-500)">${p.teacher} · ${p.class}</div>
            </div>
          `).join('')||'<div class="empty"><div class="empty-text">暂无计划</div></div>'}
        </div>
      </div>
    </div>
  `;

  // Pending reviews
  let reviewHtml = '';
  if(currentRole==='admin'||currentRole==='supervisor'){
    reviewHtml = `
      <div class="card" style="margin-bottom:16px">
        <div class="card-header">
          <span class="card-title">待审核事项</span>
          <button class="btn btn-primary btn-sm" onclick="navigateTo('plans-review')">查看全部</button>
        </div>
        <div class="card-body no-pad">
          ${pendingReviews.length?`
            <table class="table">
              <thead><tr><th>标题</th><th>类型</th><th>提交人</th><th>提交时间</th><th>操作</th></tr></thead>
              <tbody>
                ${pendingReviews.map(r=>`
                  <tr>
                    <td>${r.title}</td>
                    <td>${r.type==='weekly'?'周计划':'教学总结'}</td>
                    <td>${r.author}</td>
                    <td>${r.createdAt}</td>
                    <td><button class="btn btn-sm btn-primary" onclick="reviewPlan('${r.id}')">审核</button></td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          `:'<div class="empty"><div class="empty-icon">✓</div><div class="empty-text">暂无待审核事项</div></div>'}
        </div>
      </div>

      <div class="card-header">
        <span class="card-title">最新通知</span>

      </div>
      <div class="card-body">
        ${notices.slice(0,3).map(n=>`
          <div style="padding:8px 0;border-bottom:1px solid var(--slate-100)">
            <div style="display:flex;align-items:center;gap:6px">
              ${n.important?'<span class="badge badge-danger">重要</span>':''}
              <span style="font-weight:500;font-size:13px">${n.title}</span>
            </div>
            <div style="font-size:12px;color:var(--slate-500);margin-top:2px">${n.createdAt} · ${n.author}</div>
          </div>
        `).join('')||'<div class="empty"><div class="empty-text">暂无通知</div></div>'}
      </div>
    </div>
  `;

  return statsHtml + cardsHtml + reviewHtml + noticeHtml;
}

function initAttendance(){
  attRenderGrid();
}

function attRenderGrid(){
  const ym = document.getElementById('attMonth').value;
  const [y,m] = ym.split('-').map(Number);
  const daysInMonth = new Date(y,m,0).getDate();
  const allStudents = DB.get('students',[]);
  const attData = DB.get('attendance',{month:ym,records:[]});
  const records = attData.records||[];

  let students = allStudents;
  if(currentRole==='parent'){
    const childId = document.getElementById('attChildFilter')?.value;
    if(childId) students = allStudents.filter(s=>s.id===childId);
  }else{
    const classFilter = document.getElementById('attClassFilter')?.value;
    if(classFilter) students = allStudents.filter(s=>s.class===classFilter);
  }

  const canRecord = currentRole==='admin'||currentRole==='supervisor'||currentRole==='teacher';

  // Build week day header
  const weekDays = ['日','一','二','三','四','五','六'];

  let html = '<div class="att-grid-wrap"><table class="att-grid"><thead><tr>';
  html += '<th class="sticky-col">学生姓名</th>';
  html += '<th>班级</th>';
  for(let d=1; d<=daysInMonth; d++){
    const date = new Date(y, m-1, d);
    const wd = weekDays[date.getDay()];
    const isWeekend = date.getDay()===0||date.getDay()===6;
    html += `<th style="${isWeekend?'color:var(--red-400)':''}">${d}<br><span style="font-size:10px;font-weight:400">${wd}</span></th>`;
  }
  html += '<th>出勤率</th>';
  html += '</tr></thead><tbody>';

  students.forEach(s=>{
    html += '<tr>';
    html += `<td class="sticky-col">${s.name}</td>`;
    html += `<td style="font-size:11px;color:var(--slate-500)">${s.class}</td>`;
    let totalAttended=0, totalShould=0;
    for(let d=1; d<=daysInMonth; d++){
      const rec = records.find(r=>r.studentId===s.id && r.day===d);
      const cellClass = rec?rec.status:'empty';
      const cellText = rec?(rec.actual+'/'+rec.total):'';
      const onClick = canRecord?`onclick="attShowRecordModal('${s.id}',${d})"`:'';
      html += `<td><div class="att-cell ${cellClass}" ${onClick} title="${rec?rec.note:''}">${cellText}</div></td>`;
      if(rec){
        totalAttended += rec.actual||0;
        totalShould += rec.total||0;
      }
    }
    const rate = totalShould>0?Math.round(totalAttended/totalShould*100):0;
    const rateClass = rate>=80?'rate-full':(rate>=50?'rate-mid':'rate-low');
    html += `<td class="${rateClass}">${rate}%</td>`;
    html += '</tr>';
  });

  html += '</tbody></table></div>';
  document.getElementById('attGridContainer').innerHTML = html;
}

function attShowRecordModal(studentId, day){
  const ym = document.getElementById('attMonth').value;
  const attData = DB.get('attendance',{month:ym,records:[]});
  const records = attData.records||[];
  const rec = records.find(r=>r.studentId===studentId && r.day===day) || {total:3,actual:3,type:'集体',status:'full',note:''};
  const student = DB.get('students',[]).find(s=>s.id===studentId);
  const canModify = currentRole==='admin'||currentRole==='supervisor';

  showModal(`${student?.name||'学生'} - ${ym}-${day} 考勤`, `
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">当天总节数<span class="req">*</span></label>
        <input class="form-control" type="number" id="att-total" value="${rec.total}" min="1" max="10" onchange="attAutoStatus()">
      </div>
      <div class="form-group">
        <label class="form-label">实际出勤节数<span class="req">*</span></label>
        <input class="form-control" type="number" id="att-actual" value="${rec.actual}" min="0" max="10" onchange="attAutoStatus()">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">课程类型</label>
      <select class="form-control" id="att-type">
        <option value="集体" ${rec.type==='集体'?'selected':''}>集体课</option>
        <option value="个别" ${rec.type==='个别'?'selected':''}>个别训练</option>
        <option value="小组" ${rec.type==='小组'?'selected':''}>小组课</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">出勤状态</label>
      <select class="form-control" id="att-status">
        <option value="full" ${rec.status==='full'?'selected':''}>全勤</option>
        <option value="partial" ${rec.status==='partial'?'selected':''}>部分出勤</option>
        <option value="absent" ${rec.status==='absent'?'selected':''}>缺勤</option>
        <option value="leave" ${rec.status==='leave'?'selected':''}>请假</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">备注</label>
      <textarea class="form-control" id="att-note" placeholder="如：请假一节（感统课），原因…">${rec.note||''}</textarea>
    </div>
    ${!canModify?'<div style="font-size:12px;color:var(--amber-600);padding:6px 10px;background:var(--amber-50);border-radius:4px">您当前为只读权限，无法修改考勤记录</div>':''}
  `, `
    <button class="btn btn-secondary" onclick="closeModal()">取消</button>
    ${canModify?`<button class="btn btn-danger" onclick="attDeleteRecord('${studentId}',${day})">删除</button>`:''}
    ${canModify?`<button class="btn btn-primary" onclick="attSaveRecord('${studentId}',${day})">保存</button>`:''}
  `);
}

function attAutoStatus(){
  const total = parseInt(document.getElementById('att-total').value)||0;
  const actual = parseInt(document.getElementById('att-actual').value)||0;
  const statusSel = document.getElementById('att-status');
  if(actual===0) statusSel.value='absent';
  else if(actual>=total) statusSel.value='full';
  else statusSel.value='partial';
}

function attSaveRecord(studentId, day){
  const total = parseInt(document.getElementById('att-total').value)||0;
  const actual = parseInt(document.getElementById('att-actual').value)||0;
  if(total<1){ toast('总节数不能小于1','error'); return; }
  if(actual>total){ toast('实际节数不能大于总节数','error'); return; }

  const ym = document.getElementById('attMonth').value;
  const attData = DB.get('attendance',{month:ym,records:[]});
  if(!attData.records) attData.records = [];
  attData.month = ym;

  const idx = attData.records.findIndex(r=>r.studentId===studentId && r.day===day);
  const newRec = {
    studentId, day, total, actual,
    type:document.getElementById('att-type').value,
    status:document.getElementById('att-status').value,
    note:document.getElementById('att-note').value.trim()
  };
  if(idx>=0) attData.records[idx]=newRec;
  else attData.records.push(newRec);

  DB.set('attendance', attData);
  closeModal();
  toast('考勤已保存','success');
  attRenderGrid();
}

function attExecuteBatch(){
  const ym = document.getElementById('attMonth').value;
  const [y,m] = ym.split('-').map(Number);
  const daysInMonth = new Date(y,m,0).getDate();
  const selected = Array.from(document.querySelectorAll('.modal-body input[type=checkbox]:checked')).map(x=>x.value);
  const defaultTotal = parseInt(document.getElementById('batch-total').value)||3;

  const attData = DB.get('attendance',{month:ym,records:[]});
  if(!attData.records) attData.records=[];
  attData.month = ym;

  let added=0;
  selected.forEach(sid=>{
    for(let d=1; d<=daysInMonth; d++){
      const exists = attData.records.find(r=>r.studentId===sid && r.day===d);
      if(!exists){
        attData.records.push({studentId:sid,day:d,total:defaultTotal,actual:defaultTotal,type:'集体',status:'full',note:''});
        added++;
      }
    }
  });

  DB.set('attendance', attData);
  closeModal();
  toast(`已创建 ${added} 条记录`,'success');
  attRenderGrid();
}

function attGenerateMonthly(){
  const ym = document.getElementById('attMonth').value;
  const [y,m] = ym.split('-').map(Number);
  const daysInMonth = new Date(y,m,0).getDate();
  const allStudents = DB.get('students',[]);
  const attData = DB.get('attendance',{month:ym,records:[]});
  const records = attData.records||[];

  let classFilter = document.getElementById('attClassFilter')?.value;
  let students = classFilter?allStudents.filter(s=>s.class===classFilter):allStudents;

  let html = '<table class="att-summary-table"><thead><tr><th>姓名</th><th>班级</th><th>应出勤</th><th>实际出勤</th><th>请假</th><th>缺勤</th><th>出勤率</th></tr></thead><tbody>';

  students.forEach(s=>{
    let should=0, actual=0, leave=0, absent=0;
    for(let d=1; d<=daysInMonth; d++){
      const rec = records.find(r=>r.studentId===s.id && r.day===d);
      if(rec){
        should += rec.total;
        actual += rec.actual;
        if(rec.status==='leave') leave++;
        if(rec.status==='absent') absent++;
      }
    }
    const rate = should>0?Math.round(actual/should*100):0;
    const rateClass = rate>=80?'rate-full':(rate>=50?'rate-mid':'rate-low');
    html += `<tr><td>${s.name}</td><td>${s.class}</td><td>${should}</td><td>${actual}</td><td>${leave}</td><td>${absent}</td><td class="${rateClass}">${rate}%</td></tr>`;
  });

  html += '</tbody></table>';
  document.getElementById('attSummaryBody').innerHTML = html;
  document.getElementById('attSummaryCard').style.display='block';
  toast('汇总已生成','success');
}

function exportAttendance(){
  const ym = document.getElementById('attMonth').value;
  const [y,m] = ym.split('-').map(Number);
  const daysInMonth = new Date(y,m,0).getDate();
  const allStudents = DB.get('students',[]);
  const attData = DB.get('attendance',{month:ym,records:[]});
  const records = attData.records||[];

  let csv = `姓名,班级,${Array.from({length:daysInMonth},(_,i)=>'第'+(i+1)+'天').join(',')},出勤率\n`;
  allStudents.forEach(s=>{
    let row = `${s.name},${s.class}`;
    let attended=0, should=0;
    for(let d=1; d<=daysInMonth; d++){
      const rec = records.find(r=>r.studentId===s.id && r.day===d);
      if(rec){
        row += `,${rec.actual}/${rec.total}`;
        attended += rec.actual;
        should += rec.total;
      }else{
        row += ',-';
      }
    }
    const rate = should>0?Math.round(attended/should*100):0;
    row += `,${rate}%`;
    csv += row + '\n';
  });

  const blob = new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `考勤汇总_${ym}.csv`; a.click();
  URL.revokeObjectURL(url);
  toast('已导出','success');
}

    e.preventDefault();
    zone.classList.remove('dragover');
    if(e.dataTransfer.files.length>0){
      const input = document.getElementById('fileInput');
      input.files = e.dataTransfer.files;
      handleFileSelect(input);
    }
  });

function handleFileSelect(input){
  const file = input.files[0];
  if(!file) return;
  if(file.size > 10*1024*1024){
    toast('文件超过10MB限制','error');
    input.value='';
    return;
  }

  const reader = new FileReader();
  reader.onload = function(e){
    uploadedFileData = {
      name:file.name,
      size:file.size,
      type:file.type,
      data:e.target.result
    };
    document.getElementById('fileInfoContainer').innerHTML = `
      <div class="upload-file-info">
        <span class="file-icon">📎</span>
        <span class="file-name">${file.name}</span>
        <span class="file-size">${Math.round(file.size/1024)}KB</span>
        <span class="file-remove" onclick="clearUploadedFile()">✕</span>
      </div>
    `;
  };
  reader.readAsDataURL(file);
}

function submitPlan(id){
  if(!confirm('确认提交审核？')) return;
  let plans = DB.get('weeklyPlans',[]);
  const idx = plans.findIndex(x=>x.id===id);
  if(idx>=0){
    plans[idx].status='pending';
    DB.set('weeklyPlans', plans);

    // Create review entry
    const reviews = DB.get('plansReview',[]);
    const p = plans[idx];
    if(!reviews.find(r=>r.planId===id)){
      reviews.push({
        id:'PR'+String(reviews.length+1).padStart(3,'0'),
        type:'weekly', title:p.title, author:p.teacher,
        createdAt:p.createdAt, status:'pending',
        reviewer:'', reviewAt:'', reviewNote:'',

    }

function reviewPlanAction(id, action){
  if(action==='reject'){
    const reason = prompt('请输入驳回原因：');
    if(reason===null) return;
    executeReview(id, 'rejected', reason);
  }else{
    executeReview(id, 'approved', '审核通过');
  }
}

function executeReview(id, status, note){
  let plans = DB.get('weeklyPlans',[]);
  const idx = plans.findIndex(x=>x.id===id);
  if(idx>=0){
    plans[idx].status = status;
    plans[idx].reviewNote = note;
    plans[idx].reviewer = ROLE_INFO[currentRole].label;
    DB.set('weeklyPlans', plans);
  }
  // Update review record
  let reviews = DB.get('plansReview',[]);
  const ridx = reviews.findIndex(r=>r.planId===id);
  if(ridx>=0){
    reviews[ridx].status = status;
    reviews[ridx].reviewNote = note;
    reviews[ridx].reviewer = ROLE_INFO[currentRole].label;
    reviews[ridx].reviewAt = new Date().toISOString().slice(0,10);
    DB.set('plansReview', reviews);
  }
  toast(status==='approved'?'已通过审核':'已驳回','success');
  renderPage('weekly-plans');
}

function publishPlan(id){
  if(!confirm('确认发布？发布后家长可见。')) return;

function getWeekNumber(d){
  const date = new Date(d.getTime());
  date.setHours(0,0,0,0);
  date.setDate(date.getDate()+3-(date.getDay()+6)%7);
  const week1 = new Date(date.getFullYear(),0,4);
  return 1+Math.round(((date-week1)/86400000-3+(week1.getDay()+6)%7)/7);
}

function reviewPlan(id, action){
  if(action==='reject'){
    const reason = prompt('请输入驳回原因：');
    if(reason===null) return;
    doReview(id, 'rejected', reason);
  }else{
    doReview(id, 'approved', '审核通过');
  }
}

function doReview(id, status, note){
  let reviews = DB.get('plansReview',[]);
  const idx = reviews.findIndex(r=>r.id===id);
  if(idx<0){ toast('未找到审核项','error'); return; }
  reviews[idx].status = status;
  reviews[idx].reviewNote = note;
  reviews[idx].reviewer = ROLE_INFO[currentRole].label;
  reviews[idx].reviewAt = new Date().toISOString().slice(0,10);
  DB.set('plansReview', reviews);

  // Sync to weekly plan
  if(reviews[idx].planId){
    let plans = DB.get('weeklyPlans',[]);
    const pidx = plans.findIndex(p=>p.id===reviews[idx].planId);
    if(pidx>=0){
      plans[pidx].status = status;
      plans[pidx].reviewNote = note;
      plans[pidx].reviewer = ROLE_INFO[currentRole].label;
      DB.set('weeklyPlans', plans);
    }
  }

  toast(status==='approved'?'已通过':'已驳回','success');
  renderPage('plans-review');
}

function reviewTab(el, status){
  document.querySelectorAll('.tabs .tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('#reviewList .review-item').forEach(item=>{
    if(status==='all') item.style.display='';
    else item.style.display = item.dataset.status===status?'':'none';
  });
}

function exportData(){
  const data = {};
  for(let i=0; i<localStorage.length; i++){
    const key = localStorage.key(i);
    if(key.startsWith('hzx_')){
      data[key] = localStorage.getItem(key);
    }
  }
  const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = '慧智星数据备份_'+new Date().toISOString().slice(0,10)+'.json'; a.click();
  URL.revokeObjectURL(url);
  toast('已导出','success');
}

function importData(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const data = JSON.parse(e.target.result);
      Object.keys(data).forEach(key=>{
        if(key.startsWith('hzx_')) localStorage.setItem(key, data[key]);
      });
      toast('导入成功','success');
      navigateTo('dashboard');
    }catch(err){
      toast('导入失败：文件格式错误','error');
    }
  };
  reader.readAsText(file);
}

function resetData(){
  if(!confirm('确认重置全部数据？此操作不可恢复！')) return;
  if(!confirm('再次确认：所有数据将被清空并恢复初始示例数据。')) return;
  const keys = [];
  for(let i=0; i<localStorage.length; i++){
    const key = localStorage.key(i);
    if(key.startsWith('hzx_')) keys.push(key);
  }
  keys.forEach(k=>localStorage.removeItem(k));
  seedData();
  toast('已重置','success');
  navigateTo('dashboard');
}

/* ========== Modal & Toast ========== */
function showModal(title, body, footer){
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = body;
  document.getElementById('modalFooter').innerHTML = footer||'';
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal(){
  document.getElementById('modalOverlay').classList.remove('show');
  uploadedFileData = null;
}

function toast(msg, type='info'){
  const container = document.getElementById('toastContainer');
  const div = document.createElement('div');
  div.className = 'toast '+type;
  const icons = {success:'✓',error:'✕',warning:'⚠',info:'ℹ'};
  div.innerHTML = `<span class="toast-icon">${icons[type]||'ℹ'}</span><span class="toast-msg">${msg}</span>`;
  container.appendChild(div);
  setTimeout(()=>{
    div.style.opacity='0';
    div.style.transform='translateX(20px)';
    div.style.transition='all var(--t-normal)';
    setTimeout(()=>div.remove(),300);
  },3000);
}
